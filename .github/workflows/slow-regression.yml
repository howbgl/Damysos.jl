name: Slow Regression

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  slow-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      JULIA_NUM_THREADS: auto
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"
      - uses: julia-actions/cache@v2
      - name: Run slow CPU tests
        run: julia --color=yes --project=. -e 'using Pkg; Pkg.test(; test_args=["slow"])'
