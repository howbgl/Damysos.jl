name: GPU Tests

on:
  workflow_dispatch:

jobs:
  gpu-tests:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 120
    env:
      JULIA_NUM_THREADS: auto
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"
      - uses: julia-actions/cache@v2
      - name: Run GPU tests
        run: julia --color=yes --project=. -e 'using Pkg; Pkg.test(; test_args=["gpu"])'
